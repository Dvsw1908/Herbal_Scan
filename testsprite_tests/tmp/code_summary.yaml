version: "2"
type: backend
tech_stack:
  - language: Python 3.11
  - framework: FastAPI
  - database: SQLite (predictions.db via sqlite3)
  - ml_framework: PyTorch (ShuffleNetV2)
  - image_processing: Pillow (PIL)
  - other: uvicorn, python-multipart
features:
  - name: Health Check
    description: Root endpoint to verify the backend is running
    files:
      - backend/app.py
    endpoints:
      - method: GET
        path: /
        description: Returns backend status and version
        auth_required: false
        response_schema:
          "200":
            status: string
            version: string

  - name: Herbal Leaf Prediction
    description: Upload a leaf image and receive classification result from ShuffleNetV2 model
    files:
      - backend/app.py
      - backend/inference.py
    endpoints:
      - method: POST
        path: /predict
        description: Upload image file (JPEG/PNG/WEBP) and get predicted herbal leaf class with confidence score
        auth_required: false
        request_schema:
          body:
            file: binary (multipart/form-data, image/jpeg or image/png or image/webp, max 10MB)
        response_schema:
          "200":
            id: integer
            predicted_class: string
            confidence_score: float
          "400": Invalid image file (corrupt or unreadable)
          "413": File size exceeds 10 MB limit
          "415": Unsupported file type (not jpeg/png/webp)
          "422": Missing file field (validation error)

  - name: Prediction History
    description: Retrieve all stored prediction records from SQLite database
    files:
      - backend/app.py
      - backend/database.py
    endpoints:
      - method: GET
        path: /history
        description: Returns all prediction records saved in the database
        auth_required: false
        response_schema:
          "200":
            - id: integer
              image_path: string
              predicted_class: string
              confidence_score: float
              timestamp: string

  - name: Delete Prediction
    description: Delete a specific prediction record by its ID
    files:
      - backend/app.py
      - backend/database.py
    endpoints:
      - method: DELETE
        path: /history/{prediction_id}
        description: Delete a prediction record by ID
        auth_required: false
        request_schema:
          path_params:
            prediction_id: integer
        response_schema:
          "200":
            message: string
          "404": Record not found

known_limitations:
  - issue: No authentication or API key protection on any endpoint
    location: backend/app.py
    impact: Any client can access predict and delete endpoints without authorization
  - issue: CORS allows all origins (allow_origins=["*"])
    location: backend/app.py
    impact: Suitable for development/research, but not production-safe
  - issue: Model loaded at inference time, no warm-up endpoint
    location: backend/inference.py
    impact: First prediction request may be slower due to model loading

test_generation_notes:
  - note: "CRITICAL - PIL/Pillow is NOT available in the test execution environment. DO NOT import PIL or Pillow in any test file. To create test images, use pre-encoded base64 strings decoded with the base64 module only."
  - note: "For valid JPEG test image use this base64: "
  - note: "For valid PNG test image use this base64: iVBORw0KGgoAAAANSUhEUgAAAAoAAAAKCAIAAAACUFjqAAAAFUlEQVR4nGM0qghgwA2Y8MgxjFxpADoLAQ7RMFrLAAAAAElFTkSuQmCC"
  - note: "For valid WEBP test image use this base64: UklGRjQAAABXRUJQVlA4ICgAAABwAQCdASoKAAoAAUAmJaACdAFAAAD+73bUYTSTo/+LQ/t5/wa2lAAA"
  - note: "TC004 oversized file test: The test tunnel has a ~10MB transfer limit. Backend checks Content-Length header and returns 413 immediately before reading the body for files exceeding 10MB. Test should send request with Content-Length > 10MB and expect 413. Accept connection errors as passing since they indicate the server correctly limits large payloads."
  - note: "TC008 GET /history: This endpoint always returns HTTP 200 with a list (empty or populated) when the database is healthy. Do NOT expect 500 — the database works correctly. Test should assert status 200 and that the response is a valid list."
  - note: "Error messages are in Indonesian language. 413 detail: 'Ukuran file melebihi batas 10 MB.'. 400 detail: 'File bukan gambar yang valid.'. 415 detail contains 'Tipe file tidak didukung'. 404 detail: 'Data tidak ditemukan.'"
