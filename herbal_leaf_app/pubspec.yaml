name: herbal_leaf_app
description: "Aplikasi klasifikasi daun herbal berbasis AI menggunakan ShuffleNet."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # HTTP & networking
  http: ^1.2.2

  # Image picker (kamera + galeri)
  image_picker: ^1.1.2

  # Local storage SQLite
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # State management
  provider: ^6.1.2

  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.4
  http_parser: ^4.0.2

  # On-device ML inference
  pytorch_lite: ^4.2.0
  image: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/Icon Apps.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/leafimage/
    - assets/model/
